<!DOCTYPE html>
<html xmlns:th="http://thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Kelola Akun - Toko Olahraga</title>
    <link rel="stylesheet" th:href="@{/css/main.css}">
</head>

<body>
    <div class="dashboard-wrapper">
        <!-- ===== SIDEBAR ===== -->
        <aside th:replace="~{fragments/sidebar :: sidebar-fragments(activeMenu='akun')}"></aside>

        <!-- ======MAIN CONTENT========= -->
        <main class="main-content">
            <header class="top-navbar">
                <h1 class="page-title">Kelola Akun</h1>

                <div class="navbar-right">
                    <div class="notification-icon">
                        <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
                            <path
                                d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.9 2 2 2zm6-6v-5c0-3.07-1.63-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.64 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2zm-2 1H8v-6c0-2.48 1.51-4.5 4-4.5s4 2.02 4 4.5v6z" />
                        </svg>
                    </div>
                    <div class="user-profile">
                        <div class="user-info">
                            <span class="welcome-text">Welcome</span>
                            <span class="user-name" th:text="${session.loggedInUser}">User</span>
                        </div>
                        <div class="avatar-circle"></div>
                    </div>
                </div>
            </header>

            <div class="action-top" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <a th:href="@{/kelola-akun/tambah}" class="btn-tambah">+ Tambah Akun</a>
                
                <form th:action="@{/kelola-akun}" method="GET" style="display: flex; gap: 15px; align-items: center;">
                    <select name="sort" onchange="this.form.submit()" style="appearance: none; -webkit-appearance: none; background: rgba(0, 0, 0, 0.2) url('data:image/svg+xml;charset=UTF-8,%3Csvg xmlns=\'http://www.w3.org/2000/svg\' viewBox=\'0 0 24 24\' fill=\'none\' stroke=\'%234dc2f8\' stroke-width=\'2\' stroke-linecap=\'round\' stroke-linejoin=\'round\'%3E%3Cpolyline points=\'6 9 12 15 18 9\'%3E%3C/polyline%3E%3C/svg%3E') no-repeat right 15px center; background-size: 16px; border: 1px solid rgba(77, 194, 248, 0.3); color: var(--color-text-2); padding: 8px 40px 8px 15px; border-radius: 30px; outline: none; cursor: pointer; height: 38px;">
                        <option value="desc" th:selected="${sort == 'desc'}" style="background-color: #0d1926; color: #fff; padding: 10px;">Terbaru ditambahkan</option>
                        <option value="asc" th:selected="${sort == 'asc'}" style="background-color: #0d1926; color: #fff; padding: 10px;">Terlama ditambahkan</option>
                    </select>

                    <div class="search-bar" style="width: 300px; margin: 0; padding: 0 16px; height: 38px;">
                        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                        <input type="text" name="keyword" th:value="${keyword}" placeholder="Cari username atau nama..." style="margin-left: 10px;" />
                    </div>
                    
                    <button type="submit" style="display: none;">Search</button>
                </form>
            </div>

            <div class="main-data">
                <table>
                    <thead>
                        <tr>
                            <th>No</th>
                            <th>Username</th>
                            <th>Nama</th>
                            <th>Role</th>
                            <th>Aksi</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="a, iterStat : ${listAkun}">
                            <td th:text="${iterStat.count}"></td>
                            <td th:text="${a.username}"></td>
                            <td th:text="${a.namaLengkap}"></td>
                            <td>
                                <span th:text="${a.role}" style="padding: 4px 8px; border-radius: 4px; background: rgba(77, 194, 248, 0.2); color: #4dc2f8; font-size: 12px; font-weight: bold;"></span>
                            </td>
                            <td>
                                <div class="action-buttons">
                                    <a th:href="@{/kelola-akun/edit/{id}(id=${a.idAkun})}">Edit</a>
                                    <a href="#hapus" th:onclick="'showDeleteConfirm(' + ${a.idAkun} + ')'">Hapus</a>
                                </div>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(listAkun)}">
                            <td colspan="5" class="empty-msg">Belum ada data akun!</td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <!-- FORM START -->
            <div th:if="${mode != null}" class="form-card-container">
                <div class="form-card-glass">
                    <div class="form-header-glass">
                        <h2 th:text="${mode == 'tambah' ? 'Tambah Akun' : 'Edit Akun'}">Tambah Akun</h2>
                        <p>Silakan isi data akun di bawah ini.</p>
                    </div>

                    <form th:action="@{/kelola-akun/simpan}" th:object="${akun}" method="POST" class="form-body-glass">
                        <input type="hidden" th:if="${mode == 'edit'}" th:field="*{idAkun}" />

                        <div class="form-row-glass">
                            <div class="form-group-glass">
                                <label>Username</label>
                                <input type="text" th:field="*{username}" th:readonly="${mode == 'edit'}" placeholder="Username" required />
                            </div>
                            <div class="form-group-glass">
                                <label>Password</label>
                                <input type="text" th:field="*{password}" placeholder="Password" required />
                            </div>
                        </div>

                        <div class="form-row-glass">
                            <div class="form-group-glass">
                                <label>Nama Lengkap</label>
                                <input type="text" th:field="*{namaLengkap}" placeholder="Nama Lengkap" required />
                            </div>
                            <div class="form-group-glass">
                                <label>Role / Jabatan</label>
                                <select th:field="*{role}" required style="padding: 10px; background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 8px; color: #fff; outline: none;">
                                    <option value="ADMIN" style="background-color: #0d1926; color: #fff;">ADMIN</option>
                                    <option value="KASIR" style="background-color: #0d1926; color: #fff;">KASIR</option>
                                </select>
                            </div>
                        </div>

                        <div class="form-actions-glass">
                            <button type="submit" class="btn-submit-glass">Simpan Data</button>
                            <a th:href="@{/kelola-akun}" class="btn-cancel-glass">Batal</a>
                        </div>
                    </form>
                </div>
            </div>
        </main>
    </div>

    <!-- NOTIFICATION TOAST -->
    <div th:if="${pesan != null}" class="toast-notification" th:classappend="${tipePesan}">
        <div class="toast-icon">
            <svg th:if="${tipePesan == 'success'}" viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
            <svg th:if="${tipePesan == 'delete'}" viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="15" y1="9" x2="9" y2="15"></line><line x1="9" y1="9" x2="15" y2="15"></line></svg>
            <svg th:if="${tipePesan == 'edit'}" viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
        </div>
        <div class="toast-content">
            <span th:text="${pesan}">Message</span>
        </div>
        <div class="toast-progress"></div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const toast = document.querySelector('.toast-notification');
            if (toast) {
                setTimeout(() => {
                    toast.classList.add('hide');
                }, 3000); 
            }
        });

        function showDeleteConfirm(id) {
            const modal = document.getElementById('deleteConfirmModal');
            const btn = document.getElementById('confirmDeleteBtn');
            btn.href = '/kelola-akun/hapus/' + id;
            modal.style.display = 'flex';
        }
        
        function closeDeleteConfirm() {
            document.getElementById('deleteConfirmModal').style.display = 'none';
        }
    </script>

    <!-- Modal Konfirmasi Hapus -->
    <div id="deleteConfirmModal" class="form-card-container" style="display: none; align-items: center;">
        <div class="form-card-glass" style="max-width: 400px; text-align: center; padding: 40px 30px; animation: popInModal 0.3s ease-out forwards;">
            <div class="form-header-glass">
                <svg viewBox="0 0 24 24" width="60" height="60" fill="none" stroke="#ef4444" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-bottom: 20px; filter: drop-shadow(0 0 10px rgba(239, 68, 68, 0.4));">
                    <circle cx="12" cy="12" r="10"></circle>
                    <line x1="15" y1="9" x2="9" y2="15"></line>
                    <line x1="9" y1="9" x2="15" y2="15"></line>
                </svg>
                <h2 style="font-size: 22px; margin-bottom: 15px; color: #fff;">Konfirmasi Hapus</h2>
                <p style="color: rgba(255,255,255,0.7); font-size: 14px; line-height: 1.5; margin: 0;">Apakah Anda yakin ingin menghapus akun pegawai ini?<br/>Data yang dihapus tidak dapat dikembalikan.</p>
            </div>
            <div class="form-actions-glass" style="justify-content: center; margin-top: 30px; gap: 15px; display: flex;">
                <button type="button" onclick="closeDeleteConfirm()" class="btn-cancel-glass" style="background: rgba(255,255,255,0.1); color: #fff; border: 1px solid rgba(255,255,255,0.2); flex: 1;">Batal</button>
                <a id="confirmDeleteBtn" href="#" class="btn-cancel-glass" style="background: #ef4444; color: #fff; border: none; flex: 1; text-decoration: none;">Ya, Hapus</a>
            </div>
        </div>
    </div>
</body>

</html>
