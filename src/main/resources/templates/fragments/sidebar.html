<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head></head>

<body>
    <aside th:fragment="sidebar-fragments" class="sidebar">
        <!-- LOGO - SIDEBAR -->
        <div class="sidebar-brand">
            <img th:src="@{/assets/logo.png}" style="max-width: 120px; filter: drop-shadow(0 0 8px rgba(77, 194, 248, 0.8));">
        </div>

        <!-- MENU - SIDEBAR -->
        <div class="nav-menu">
            <ul>
                <!-- Using th:classappend to highlight active page -->
                <li th:classappend="${activeMenu == 'dashboard' ? 'active' : ''}">
                    <a th:href="@{/dashboard}">
                        <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z"/></svg>
                        <span>Dashboard</span>
                    </a>
                </li>
                <li th:if="${session.role == 'ADMIN'}" th:classappend="${activeMenu == 'barang' ? 'active' : ''}">
                    <a th:href="@{/barang}">
                        <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M20 6h-4V4c0-1.11-.89-2-2-2h-4c-1.11 0-2 .89-2 2v2H4c-1.11 0-1.99.89-1.99 2L2 19c0 1.11.89 2 2 2h16c1.11 0 2-.89 2-2V8c0-1.11-.89-2-2-2zm-6 0h-4V4h4v2z"/></svg>
                        <span>Barang</span>
                    </a>
                </li>
                <li th:classappend="${activeMenu == 'customer' ? 'active' : ''}">
                    <a th:href="@{/customer}">
                        <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg>
                        <span>Customer</span>
                    </a>
                </li>
                <li th:classappend="${activeMenu == 'penjualan' ? 'active' : ''}">
                    <a th:href="@{/penjualan}">
                        <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M7 18c-1.1 0-1.99.9-1.99 2S5.9 22 7 22s2-.9 2-2-.9-2-2-2zM1 2v2h2l3.6 7.59-1.35 2.45c-.16.28-.25.61-.25.96 0 1.1.9 2 2 2h12v-2H7.42c-.14 0-.25-.11-.25-.25l.03-.12.9-1.63h7.45c.75 0 1.41-.41 1.75-1.03l3.58-6.49c.08-.14.12-.31.12-.48 0-.55-.45-1-1-1H5.21l-.94-2H1zm16 16c-1.1 0-1.99.9-1.99 2s.89 2 1.99 2 2-.9 2-2-.9-2-2-2z"/></svg>
                        <span>Penjualan</span>
                    </a>
                </li>
                <li th:if="${session.role == 'ADMIN'}" th:classappend="${activeMenu == 'akun' ? 'active' : ''}">
                    <a th:href="@{/kelola-akun}">
                        <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
                        <span>Kelola Akun</span>
                    </a>
                </li>
                <li th:if="${session.role == 'ADMIN'}" th:classappend="${activeMenu == 'laporan' ? 'active' : ''}">
                    <a th:href="@{/laporan}">
                        <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zM9 17H7v-7h2v7zm4 0h-2V7h2v10zm4 0h-2v-4h2v4z"/></svg>
                        <span>Laporan</span>
                    </a>
                </li>
            </ul>
        </div>

        <!-- FOOTER -SIDEBAR -->
        <div class="sidebar-footer">
            <form th:action="@{/logout}" method="get">
                <button type="submit" class="logout-btn">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M17 7l-1.41 1.41L18.17 11H8v2h10.17l-2.58 2.58L17 17l5-5zM4 5h8V3H4c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h8v-2H4V5z"/></svg>
                    <span>Logout</span>
                </button>
            </form>
        </div>
    </aside>
</body>

</html>
