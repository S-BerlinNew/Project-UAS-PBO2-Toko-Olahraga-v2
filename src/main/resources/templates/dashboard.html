<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Dashboard - Toko Olahraga</title>
    <link rel="stylesheet" th:href="@{/css/variables.css}">
    <link rel="stylesheet" th:href="@{/css/main.css}">
</head>
<body>

<div class="dashboard-wrapper">

    <!-- ===== SIDEBAR ===== -->
    <aside th:replace="~{fragments/sidebar :: sidebar-fragments(activeMenu='dashboard')}"></aside>

    <!-- ===== MAIN CONTENT ===== -->
    <main class="main-content">
        <!-- New Top Navbar -->
        <header class="top-navbar">
            <h1 class="page-title">Dashboard</h1>
            
            <div class="search-bar">
                <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
                <input type="text" placeholder="Search">
            </div>
            
            <div class="navbar-right">
                <div class="notification-icon">
                    <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor"><path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.9 2 2 2zm6-6v-5c0-3.07-1.63-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.64 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2zm-2 1H8v-6c0-2.48 1.51-4.5 4-4.5s4 2.02 4 4.5v6z"/></svg>
                </div>
                <div class="user-profile">
                    <div class="user-info">
                        <span class="welcome-text">Welcome</span>
                        <span class="user-name" th:text="${session.loggedInUser}">User</span>
                    </div>
                    <div class="avatar-circle"></div>
                </div>
            </div>
        </header>

        <!-- Main dashboard content is empty for now -->
        
    </main>

</div>

</body>
</html>
